name: CFPs scrapen

on:
  schedule:
    # 06:23 und 17:23 UTC – krumme Minute, weil GitHub zur vollen Stunde überlastet ist
    - cron: "23 6,17 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Abhängigkeiten installieren
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Scrapen und Mails verschicken
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          FROM_EMAIL: ${{ secrets.SMTP_USER }}
          SUBSCRIBERS: ${{ secrets.SUBSCRIBERS }}
        run: python ci_run.py

      - name: Daten committen
        run: |
          git config user.name "cfp-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data.json
          if git diff --cached --quiet; then
            echo "Keine Änderungen."
          else
            git commit -m "Daten aktualisiert ($(date -u +%Y-%m-%d' '%H:%M) UTC)"
            git push
          fi
